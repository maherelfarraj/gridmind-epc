name: Configure Vercel Project

on:
  workflow_dispatch:
    inputs:
      rename_project:
        description: "Rename project to gridmindepc (fixes gridmindepc.vercel.app)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Vercel project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT: gridmind-epc
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          RENAME_PROJECT: ${{ inputs.rename_project == 'true' && 'gridmindepc' || '' }}
        run: |
          chmod +x scripts/configure-vercel-project.sh
          ./scripts/configure-vercel-project.sh
