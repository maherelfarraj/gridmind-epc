name: Vercel Production Setup

on:
  workflow_dispatch:
  push:
    branches: ["main"]

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  configure:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - name: Configure Vercel (Root Directory, domains, rename)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          VERCEL_DOMAINS: pvmind.ai,www.pvmind.ai
        run: |
          if [[ -z "${VERCEL_TOKEN:-}" ]]; then
            echo "VERCEL_TOKEN not set. Add it in GitHub repo secrets, then re-run this workflow."
            echo "Manual steps: Vercel -> gridmind-epc -> Root Directory=web, Domains=pvmind.ai"
            exit 0
          fi
          chmod +x scripts/configure-vercel-project.sh
          ./scripts/configure-vercel-project.sh

      - name: Sync Supabase env vars to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_TEAM_ID: ${{ secrets.VERCEL_TEAM_ID }}
          NEXT_PUBLIC_APP_URL: https://pvmind.ai
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [[ -z "${VERCEL_TOKEN:-}" ]]; then
            exit 0
          fi
          missing=0
          for key in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY; do
            if [[ -z "${!key:-}" ]]; then
              echo "MISSING secret: ${key}"
              missing=1
            else
              echo "OK secret present: ${key}"
            fi
          done
          if [[ "$missing" -eq 1 ]]; then
            echo "Add repository or Production environment secrets with exact names above."
            exit 1
          fi
          chmod +x scripts/configure-vercel-env.sh
          ./scripts/configure-vercel-env.sh

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
