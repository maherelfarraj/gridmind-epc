version: "3.8"

services:
  ai_platform:
    build: .
    container_name: solar_epc_ai_core
    env_file:
      - .env
    ports:
      - "8501:8501"
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0
    volumes:
      - .:/app
    depends_on:
      - db_engine

  api_gateway:
    build: .
    container_name: solar_epc_api_gateway
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    depends_on:
      - db_engine

  db_engine:
    image: postgres:16
    container_name: solar_epc_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - solar_postgres_data:/var/lib/postgresql/data

  seed_runner:
    build: .
    container_name: solar_epc_seed_runner
    env_file:
      - .env
    command: python seed_db.py
    volumes:
      - .:/app
    depends_on:
      - db_engine

  mqtt_broker:
    image: eclipse-mosquitto:2
    container_name: solar_epc_mqtt
    ports:
      - "1883:1883"

  prometheus:
    image: prom/prometheus:latest
    container_name: solar_epc_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

volumes:
  solar_postgres_data:
